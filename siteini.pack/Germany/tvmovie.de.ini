site {url=tvmovie.de|timezone=UTC|maxdays=17|cultureinfo=de-DE|charset=utf-8|titlematchfactor=90|allowlastdayoverflow}
*site {retry=<retry time-out="4" index-delay="1">6</retry>|episodesystem=onscreen|ratingsystem=DE}
url_index{url|https://proxy.xceler8.io/v2/epg-search?airTime=|urldate|T03:00:00.000Z&channelIds=|channel|&offset=0&limit=50}
url_index.headers {customheader=Accept-Encoding=gzip,deflate}
urldate.format {datestring|yyyy-MM-dd}
*
index_showsplit.scrub {multi ()|"broadcasts":[|||}]}}
*index_showsplit.modify {(debug)}
*
index_urlshow {url|http://www.tvmovie.de|"url":"||"|"}
index_urlshow.headers {customheader=Accept-Encoding=gzip,deflate}
*
index_start.scrub {single|"airTime":"||Z|"}
index_stop.scrub {single|"airTimeEnd":"||Z|"}
index_title.scrub {single|"title":"||"|"}
index_subtitle.scrub {single|"subTitle":"||"|"}
index_category.scrub {multi|"categoryName":"||"|"}
index_category.scrub {multi|"genreName":"||"|"}
index_productiondate.scrub {single|"productionYear":||,|,}
index_country.scrub {multi|<span class="u-semibold">Produktionsland</span>|</td>|</td>|</table>}
index_country.scrub {multi (separator=",")|"countriesOfProduction":|[|]|,}
index_country.modify {remove|"}
*
*index_title.modify {cleanup(tags="<"">")}
*
scope.range {(showdetails)|end}
title.modify{addstart ('title' = "")|'index_title'}
temp_2.scrub {multi ()|<script data-vmid="structured-data"|||</script>}
temp_2.modify {select ()|"TVEpisode" ~}
temp_2.modify {cleanup}
description.modify {substring (type=regex)|'temp_2' "description":"(.*?)",}
episode.modify {substring (type=regex)|'temp_2' "seasonNumber":(\d+)}
episode.modify {addstart ('episode' not "")|S}
temp_1.modify {substring (type=regex)|'temp_2' "episodeNumber":(\d+),}
episode.modify {addend ('temp_1' not "")|E'temp_1'}
director.modify {substring (type=regex)|'temp_2' "director":{(.*?)}}
director.modify {substring (type=regex)|'director' "name":(".*?")}
actor.modify {substring (type=regex)|'temp_2' "actor":\[(.*?)\]}
actor.modify {substring (type=regex)|'actor' "name":"(.*?)"}}
director.modify {remove|"}
end_scope
